name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

# Permissions required for GitHub Pages & gh-pages branch
permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Inject FACEIT API Key from Secrets
        env:
          FACEIT_API_KEY: ${{ secrets.FACEIT_API_KEY }}
        run: |
          node -e "
            const fs = require('fs');
            const key = (process.env.FACEIT_API_KEY || '').trim();
            console.log('FACEIT_API_KEY secret detected:', key.length > 0 ? 'YES (' + key.length + ' chars)' : 'NO (EMPTY)');
            let content = fs.readFileSync('app.js', 'utf8');
            content = content.replaceAll('__FACEIT_API_KEY__', key);
            fs.writeFileSync('app.js', content, 'utf8');
          "

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages Direct
        id: deployment
        uses: actions/deploy-pages@v4
