name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Inject FACEIT API Key from Secrets
        env:
          FACEIT_API_KEY: ${{ secrets.FACEIT_API_KEY }}
        run: |
          # Use Node.js to safely replace the placeholder, preventing shell escape or special character issues (like slashes or pipe symbols)
          node -e "
            const fs = require('fs');
            let content = fs.readFileSync('app.js', 'utf8');
            content = content.replaceAll('__FACEIT_API_KEY__', process.env.FACEIT_API_KEY || '');
            fs.writeFileSync('app.js', content, 'utf8');
          "

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Upload the entire repository root as the website directory
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
