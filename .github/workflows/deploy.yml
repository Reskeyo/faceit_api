name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    environment: github-pages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Inject Worker URL into app.js
        run: |
          node -e "
            const fs = require('fs');
            const url = 'https://faceit-proxy.dolinskzyyvictor.workers.dev';
            console.log('Injecting Worker URL:', url);
            let content = fs.readFileSync('app.js', 'utf8');
            content = content.replace('__WORKER_URL__', url);
            fs.writeFileSync('app.js', content, 'utf8');
            console.log('Done!');
          "

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
