name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Inject FACEIT API Key
        env:
          SECRET_KEY: ${{ secrets.FACEIT_API_KEY }}
          VAR_KEY: ${{ vars.FACEIT_API_KEY }}
        run: |
          node -e "
            const fs = require('fs');
            const key = (process.env.SECRET_KEY || process.env.VAR_KEY || '').trim();
            console.log('FACEIT_API_KEY length:', key.length);
            if (key.length === 0) {
              console.log('WARNING: Neither secrets.FACEIT_API_KEY nor vars.FACEIT_API_KEY was found!');
            } else {
              console.log('SUCCESS: API key successfully injected into app.js!');
            }
            let content = fs.readFileSync('app.js', 'utf8');
            content = content.replaceAll('__FACEIT_API_KEY__', key);
            fs.writeFileSync('app.js', content, 'utf8');
          "

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages Direct
        id: deployment
        uses: actions/deploy-pages@v4
